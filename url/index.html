<!DOCTYPE html>
<html>
  <head>
    <title>URL Shortener</title>
  </head>
  <body>
    <h1>URL Shortener</h1>
    <form method="POST" action="/">
      <label for="url">Enter the URL you want to shorten:</label><br>
      <input type="text" id="url" name="url"><br><br>
      <input type="submit" value="Shorten URL">
    </form>
  </body>
</html>
